<!doctype html>
<html lang="hi">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Offline Reader Pro</title>
		<link rel="stylesheet" href="./css/reader.css" />
	</head>
	<body>
		<button class="sidebar-toggle-btn" onclick="toggleSidebar(event)">
			<span id="toggle-text">Menu</span>
		</button>

		<div class="side-control-bar" id="side-control-bar">
			<div class="common-sidebar-controls" aria-label="Shared story controls">
				<div class="control-group section-story">
					<label>Story File</label>
					<label for="jsonFile" class="btn-common browse-label">Browse JSON</label>
					<input type="file" id="jsonFile" accept=".json" onchange="handleFileSelect(event)" />
					<span id="file-name-display" style="font-size: 0.8rem; opacity: 0.7; font-style: italic; text-align: center">No file chosen</span>
				</div>

				<div class="control-group section-package">
					<label>FetchStory Package</label>
					<label for="fstoryFile" class="btn-common browse-label">Open .fstory</label>
					<input type="file" id="fstoryFile" accept=".fstory,application/zip" hidden />
					<button class="btn-common download-link" id="downloadFstoryBtn" type="button">Download Updated .fstory</button>
					<span id="fstory-status" class="small-status"></span>
				</div>

				<div class="control-group section-images">
					<label for="imageFolderPicker" class="btn-common browse-label">Browse Image Folder</label>
					<input type="file" id="imageFolderPicker" webkitdirectory directory multiple hidden />
					<span id="image-folder-status" class="small-status"></span>
				</div>

				<div class="control-group section-cache">
					<label>Cache</label>
					<button class="btn-common clear-cache-btn" id="clear-cache-btn">Clear Cache</button>
				</div>

				<div class="control-group section-session">
					<label>Session</label>
					<button class="btn-common logout-btn" id="logoutBtn" type="button">Logout</button>
				</div>
			</div>

			<div class="sidebar-tabs">
				<button type="button" class="sidebar-tab-btn active" id="reader-tab-btn" onclick="switchSidebarTab('reader')">Reader</button>
				<button type="button" class="sidebar-tab-btn" id="translator-tab-btn" onclick="switchSidebarTab('translator')">Translator</button>
			</div>

			<div class="tab-panel active" id="reader-tab-panel">
				<div class="control-group section-reading">
					<label>Loading Mode</label>
					<div class="statusBox">
						<p id="read-progress">Read: 0%</p>
					</div>
					<button class="btn-common load-all-btn" id="load-all-btn" onclick="loadWholeStory()">Load All Parts</button>
				</div>

				<div class="control-group section-font">
					<label>Font Size</label>
					<div class="font-controls">
						<button class="font-btn" onclick="adjustFontSize(-0.1)">A -</button>
						<button class="font-btn" onclick="adjustFontSize(0.1)">A +</button>
					</div>
				</div>

				<div class="control-group section-theme">
					<label>Reading Theme</label>
					<select class="theme-select" id="theme-select" onchange="changeTheme(this.value)">
						<option value="light">Light Theme</option>
						<option value="dark">Dark Theme</option>
						<option value="sepia">Sepia Theme</option>
						<option value="forest">Forest Green</option>
						<option value="cyber">Cyberpunk Neon</option>
					</select>
				</div>

				<div class="control-group section-color">
					<label>Custom Bg Color</label>
					<div class="color-picker-wrapper">
						<input type="color" id="bg-color-picker" class="color-input" value="#f4f4f9" oninput="setCustomBg(this.value)" />
						<span style="font-size: 0.85rem">Choose Custom Color</span>
					</div>
				</div>

				<div class="control-group section-actions">
					<label>Actions</label>
					<button class="btn-common language-toggle-btn" id="lang-toggle-btn" onclick="toggleLanguage()">Switch to Hindi</button>
					<button class="btn-common print-btn" style="margin-top: 8px" onclick="handlePrint()">Print Story</button>
				</div>
			</div>

			<div class="tab-panel" id="translator-tab-panel">
				<div class="control-group section-translator">
					<label>Translate</label>
					<button class="btn-common translate-btn" id="translateBtn">Translate Story</button>
					<button class="btn-common stop-translate-btn hide" id="stopTranslateBtn">Stop Translation</button>
					<div class="statusBox">
						<p id="status">Waiting...</p>
					</div>
					<progress id="progressBar" value="0" max="100"></progress>
					<div class="translator-stats">
						<div>
							<label for="total_words">Total Words:</label>
							<input type="text" name="total_words" id="total_words" placeholder="0" disabled />
						</div>
						<div>
							<label for="not_found_words">Not Found words:</label>
							<input type="text" name="not_found_words" placeholder="0" id="not_found_words" disabled />
						</div>
						<div>
							<label for="con_per">Conversion %:</label>
							<input type="text" name="con_per" placeholder="0" id="con_per" disabled />
						</div>
					</div>
					<a id="downloadBtn" class="hide btn-common download-link" href="#"> Download Translated JSON </a>
					<a id="downloadNotFoundBtn" class="hide btn-common download-link" href="#"> Download Not Found Words </a>
				</div>
			</div>
		</div>
		<div class="reader-container">
			<h1 class="story-title" id="story-main-title">Select or Load a Story...</h1>
			<div id="content-area">Story Content</div>
			<div id="reader-status" class="loading-status">Waiting for JSON data...</div>
		</div>
		<script src="/vendor/jszip/jszip.min.js"></script>
		<script src="./js/fstory.js"></script>
		<script src="./js/reader.js"></script>
	</body>
</html>
